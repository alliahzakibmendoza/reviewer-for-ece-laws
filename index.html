rce": "Uploaded reviewer images", "number": 53, "q": "Which of the following is part of the hierarchy of controls?", "choices": ["Substitution", "Municipal Circuit Trial Court", "Psychological Harm", "Adjective Law"], "answer": 0, "explanation": ""}, {"book": "Law & Safety", "topic": "Extra Review from Clearer Images", "set": "Image Reviewer", "source": "Uploaded reviewer images", "number": 54, "q": "Which of the following is a factor that creates risk?", "choices": ["Article 3", "Telecommuting", "Court of Tax Appeals", "Uncertainty"], "answer": 3, "explanation": ""}, {"book": "Law & Safety", "topic": "Extra Review from Clearer Images", "set": "Image Reviewer", "source": "Uploaded reviewer images", "number": 55, "q": "Which of the following is a harm affecting safety engineering?", "choices": ["Custom Harm", "Normative Harm", "Professional Harm", "Dormant Harm"], "answer": 2, "explanation": ""}, {"book": "Law & Safety", "topic": "Extra Review from Clearer Images", "set": "Image Reviewer", "source": "Uploaded reviewer images", "number": 56, "q": "Which risk assessment step comes after identifying the hazards?", "choices": ["Record the findings immediately", "Determine what or who could be harmed", "Review and update regularly", "Apply PPE only"], "answer": 1, "explanation": ""}, {"book": "Law & Safety", "topic": "Extra Review from Clearer Images", "set": "Image Reviewer", "source": "Uploaded reviewer images", "number": 57, "q": "Which risk assessment step comes after evaluating risks and developing control measures?", "choices": ["Record the findings", "Determine what or who could be harmed", "Identify the hazards", "Ignore the risk"], "answer": 0, "explanation": ""}, {"book": "Law & Safety", "topic": "Extra Review from Clearer Images", "set": "Image Reviewer", "source": "Uploaded reviewer images", "number": 58, "q": "Which risk assessment step should be done regularly after recording findings?", "choices": ["Use only PPE", "Review and update the risk assessment regu let questions=[...allQuestions],current=0,score=0,answered=Array(questions.length).fill(null);const letters=["A","B","C","D"];
function renderQuestion(){const q=questions[current];document.getElementById("quizCard").style.display="block";document.getElementById("result").style.display="none";document.getElementById("counter").textContent=`Question ${current+1} of ${questions.length}`;document.getElementById("score").textContent=`Score: ${score} / ${questions.length}`;document.getElementById("badge").textContent=`${q.set||"Reviewer"} • ${q.book} • ${q.topic}`;document.getElementById("qtext").textContent=q.q;document.getElementById("progress").style.width=`${((current+1)/questions.length)*100}%`;document.getElementById("prev").disabled=current===0;const wrap=document.getElementById("choices");wrap.innerHTML="";q.choices.forEach((choice,idx)=>{const b=document.createElement("button");b.className="choice";b.innerHTML=`<span class="letter">${letters[idx]||""}</span><span>${choice}</span>`;b.onclick=()=>selectAnswer(idx);if(answered[current]!==null){b.disabled=true;if(idx===q.answer)b.classList.add("correct");if(idx===answered[current]&&idx!==q.answer)b.classList.add("wrong");}wrap.appendChild(b);});document.getElementById("next").disabled=answered[current]===null;document.getElementById("next").textContent=current===questions.length-1?"Finish":"Next";}
function selectAnswer(i){if(answered[current]!==null)return;answered[current]=i;if(i===questions[current].answer)score++;renderQuestion();}
function nextQuestion(){if(current<questions.length-1){current++;renderQuestion();}else showResult();}
function prevQuestion(){if(current>0){current--;renderQuestion();}}
function showResult(){document.getElementById("quizCard").style.display="none";document.getElementById("result").style.display="block";let p=Math.round(score/questions.length*100);document.getElementById("final").textContent=`${score} / ${questions.length} (${p}%)`;document.getElementById("msg").textContent=p>=85?"Great review result.":p>=70?"Good progress. Review the highlighted answers you missed.":"Keep reviewing and try again.";}
function resetQuiz(){current=0;score=0;answered=Array(questions.length).fill(null);renderQuestion();}
function shuffleQuestions(){for(let i=questions.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}resetQuiz();}
function setFilter(f,btn){document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");questions=f==="All"?[...allQuestions]:allQuestions.filter(q=>q.book===f||q.set===f||q.topic===f);resetQuiz();}
renderQuestion();
