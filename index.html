function renderQuestion(){const q=questions[current];document.getElementById("quizCard").style.display="block";document.getElementById("resultCard").style.display="none";document.getElementById("counter").textContent=`Question ${current+1} of ${questions.length}`;document.getElementById("score").textContent=`Score: ${score} / ${questions.length}`;document.getElementById("bookBadge").textContent=`${q.set||"Reviewer"} • ${q.book} • ${q.topic}`;document.getElementById("questionText").textContent=q.q;document.getElementById("progress").style.width=`${((current+1)/questions.length)*100}%`;document.getElementById("prevBtn").disabled=current===0;const choices=document.getElementById("choices");choices.innerHTML="";const letters=["A","B","C","D"];q.choices.forEach((choice,idx)=>{const btn=document.createElement("button");btn.className="choice";btn.innerHTML=`<span class="letter">${letters[idx]||""}</span><span>${choice}</span>`;btn.onclick=()=>selectAnswer(idx);if(answered[current]!==null){btn.disabled=true;if(idx===q.answer)btn.classList.add("correct");if(idx===answered[current]&&idx!==q.answer)btn.classList.add("wrong");}choices.appendChild(btn);});const box=document.getElementById("answerBox");if(answered[current]!==null){const isCorrect=answered[current]===q.answer;const correctLetter=letters[q.answer]||"";const correctText=q.choices[q.answer];box.className="answerBox show";box.innerHTML=`<span class="${isCorrect?"correct-text":"wrong-text"}">${isCorrect?"Correct!":"Incorrect."}</span><br>Right answer: ${correctLetter}. ${correctText}`;document.getElementById("nextBtn").disabled=false;document.getElementById("nextBtn").textContent=current===questions.length-1?"Finish":"Next";}else{box.className="answerBox";box.innerHTML="";document.getElementById("nextBtn").disabled=true;document.getElementById("nextBtn").textContent=current===questions.length-1?"Finish":"Next";}}
function selectAnswer(idx){if(answered[current]!==null)return;answered[current]=idx;if(idx===questions[current].answer)score++;renderQuestion();}
function nextQuestion(){if(current<questions.length-1){current++;renderQuestion();}else{showResult();}}
function prevQuestion(){if(current>0){current--;renderQuestion();}}
function showResult(){document.getElementById("quizCard").style.display="none";document.getElementById("resultCard").style.display="block";const percent=Math.round((score/questions.length)*100);document.getElementById("finalScore").textContent=`${score} / ${questions.length} (${percent}%)`;document.getElementById("finalMessage").textContent=percent>=85?"Great review result.":percent>=70?"Good progress. Review the items you missed.":"Keep reviewing and try again.";}
function resetQuiz(){current=0;score=0;answered=Array(questions.length).fill(null);renderQuestion();}
function shuffleQuestions(){for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}resetQuiz();}
function setFilter(filter,btn){currentFilter=filter;document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");questions=filter==="All"?[...allQuestions]:allQuestions.filter(q=>q.book===filter||q.set===filter||q.topic===filter);resetQuiz();}
renderQuestion();
</script>
